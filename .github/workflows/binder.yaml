name: Binder Prebuild
on:
  push:
    branches: [main]  # Triggers when you update your tutorials
  pull_request:       # Triggers when someone submits a PR to you

jobs:
  prebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Trigger Binder Build
        run: |
          # We ping the Binder API to build the COMBINED environment
          # Replace 'cwslab' with your actual GitHub Org/Username if different
          curl -X GET "https://mybinder.org/build/gh/cwslab/usgs-env/main"
